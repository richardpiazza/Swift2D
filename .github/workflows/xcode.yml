name: Xcode

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  SCHEME: "Swift2D"

jobs:

  Build:
    strategy:
      fail-fast: false
      matrix:
        platform: [
          "macOS",
          "iOS",
          "tvOS",
          "watchOS",
          "visionOS",
          "macOS,variant=Mac Catalyst",
        ]
    runs-on: macos-26
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Cache
      uses: actions/cache@v5
      with:
        path: |
          .build
          ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          ~/Library/Caches/org.swift.swiftpm
          ~/Library/org.swift.swiftpm
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift', '**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: Package Resolution
      run: set -o pipefail && xcodebuild -resolvePackageDependencies | xcbeautify

    - name: Build
      env:
        DESTINATION: "generic/platform=${{ matrix.platform }}"
      run: set -o pipefail && xcodebuild build -scheme "$SCHEME" -destination "$DESTINATION" | xcbeautify
